image: google/cloud-sdk:slim
pipelines:
  custom:
    Docs:
      - step:
          name: Build Documentation (Linux)
          script:
            - echo "$GCP_SERVICE_ACCOUNT_JSON_B64" | base64 -d > /tmp/gcp-key.json
            - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
            - apt-get update
            - apt-get install -y --no-install-recommends build-essential git cmake doxygen graphviz curl ca-certificates
            - chmod +x build_engine.sh
            - ./build_engine.sh --docs-only
            # Upload documentation
            - |
              gsutil -m rsync -r \
                Build/Docs/html \
                gs://docs.rendering-engine.alexander-obzherin.info/
  custom:
    SDK_Build_Linux:
      - step:
          name: Build SDK (Linux)
          script:
            - echo "$GCP_SERVICE_ACCOUNT_JSON_B64" | base64 -d > /tmp/gcp-key.json
            - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
            - apt-get update
            - apt-get install -y --no-install-recommends build-essential git cmake doxygen graphviz libvulkan-dev vulkan-tools vulkan-validationlayers libglfw3-dev libglm-dev libgtest-dev libjpeg-dev libpng-dev libassimp-dev pkg-config libfreetype-dev nlohmann-json3-dev libboost-filesystem-dev curl ca-certificates
            - chmod +x build_engine.sh
            - ./build_engine.sh --build-sdk
            # Upload SDK artifact
            - |
              gsutil cp \
                Build/Packages/RenderingEngine-v0.2.0-SDK-Linux.tar.gz \
                gs://downloads.rendering-engine.alexander-obzherin.info/
  custom:
    SDK_Build_Windows:
      - step:
          name: Build SDK (Windows self-hosted)
          runs-on:
            - self.hosted
            - windows
          script:
            - powershell -NoProfile -Command '
                $out = Join-Path $env:TEMP "gcp-key.json";
                $bytes = [Convert]::FromBase64String($env:GCP_SERVICE_ACCOUNT_JSON_B64);
                [IO.File]::WriteAllBytes($out, $bytes)
              '
            # Authenticate to GCP
            - gcloud auth activate-service-account --key-file "$env:TEMP\gcp-key.json"
            # Verify toolchain (debug-friendly)
            - where cl
            - where cmake
            - where gcloud
            - where gsutil
            # Build SDK
            - .\build_engine.bat --build-sdk
            # Upload artifact
            - gsutil cp `
                Build\Packages\RenderingEngine-v0.2.0-SDK-Windows.tar.gz `
                gs://downloads.rendering-engine.alexander-obzherin.info/
            - pipe: atlassian/bitbucket-upload-file:0.3.2
              variables:
                BITBUCKET_USERNAME: $BITBUCKET_USERNAME
                BITBUCKET_APP_PASSWORD: $BITBUCKET_APP_PASSWORD
                FILENAME: 'build-alpha-status.svg' 
  custom:
    SDK_Build_FreeBSD:
      - step:
          name: Build SDK (FreeBSD self-hosted)
          runs-on:
            - self.hosted
            - linux.shell
          script:
            - export PATH="/usr/local/bin:/usr/bin:/bin"
            - echo "$GCP_SERVICE_ACCOUNT_JSON_B64" | base64 -d > /tmp/gcp-key.json
            - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
            # Sanity checks (optional but useful)
            - uname -a
            - which cmake
            - which gcloud
            - which gsutil 
            - chmod +x build_engine.sh
            - ./build_engine.sh --build-sdk
            # Upload SDK artifact
            - |
              gcloud storage cp \
                Build/Packages/RenderingEngine-v0.2.0-SDK-FreeBSD.tar.gz \
                gs://downloads.rendering-engine.alexander-obzherin.info/